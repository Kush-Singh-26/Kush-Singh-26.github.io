title: "Kush Singh"
logo: "static/images/logo.png"
baseURL: ""
language: "en"

outputDir: "public"
contentDir: "content"
themeDir: "themes"
# staticDir: "static"
cacheDir: ".kosh-cache"
theme: "blog"
contentPrefix: "blogs"
navbar:
  home:
    title: "Kush Singh"
    btnLabel: "Blogs"
  section:
    title: "Kush Blogs"
    btnLabel: "Home"
  homeBadge: "Latest Updates"

taxonomies:
  tags: "tags"
  series: "series" # Chronologically sorted (earliest first)
  events: "events" # Chronologically sorted for timeline views

menu:
  - name: "Search"
    id: "search-btn"
    class: "nav-btn"
  - name: "Tags"
    url: "/blogs/tags/"
  - name: "Graph"
    url: "/graph.html"

footerMenu:
  - name: "Home"
    url: "/"
  - name: "Blogs"
    url: "/blogs/"
  - name: "GitHub"
    url: "https://github.com/Kush-Singh-26/"
    target: "_blank"
  - name: "RSS Feed"
    url: "/rss.xml"
    target: "_blank"

# Social Cards (Open Graph Images)
socialCards:
  background: "#141816"    # Deep Inky Black/Sage (matches --bg-body)
  gradient:                # Gradient from Sage Ink to Aged Gold
    - "#8ba395"            # Sage Ink (matches --accent-primary)
    - "#b59d6d"            # Aged Gold (matches --accent-secondary)
  angle: 135               # Gradient angle
  textColor: "#e1e9e4"     # Slate Text (matches --text-main)

imageWorkers: 8
shouldCompressImages: true

features:
  useRawMarkdown: true # Copies .md files to output for "View Source" support
  generators:
    isSitemapEnabled: true
    isRSSEnabled: true
    isPWAEnabled: true
    search:
      isEnabled: true
      # Tune BM25 ranking and field boosts
      ranking:
        titleBoost: 50.0       # Strong priority for title matches
        tagBoost: 10.0         # Priority for tag matches
        descriptionBoost: 5.0  # Priority for description matches
        contentBoost: 0.05     # Minimal priority for body text to favor titles
        bm25K1: 1.2            # Term frequency saturation
        bm25b: 0.4             # Reduced length normalization (less penalty for short titles)
      # Federated Search: Fetch indices from multiple Kosh sites
      endpoints:
        - "/search.bin"        # Local index
        # - "https://another-kosh-site.com/search.bin"
    graph:
      isEnabled: true
      showsTaxonomies: true
