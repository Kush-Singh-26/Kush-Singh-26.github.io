title: "Kush Singh"
description: "Deep dives into Machine Learning, Systems Engineering, and LLMs."
logo: "static/images/logo.png"
baseURL: ""
language: "en"

outputDir: "public"
contentDir: "content"
themeDir: "themes"
staticDir: "themes/blog/static"
cacheDir: ".kosh-cache"
theme: "blog"
blogPrefix: "blogs"

menu:
  - name: "Search"
    id: "search-btn"
    class: "nav-btn"
  - name: "Tags"
    url: "/blogs/tags/"
  - name: "Graph"
    url: "/graph.html"

footerMenu:
  - name: "Home"
    url: "/"
  - name: "Blogs"
    url: "/blogs/"
  - name: "GitHub"
    url: "https://github.com/Kush-Singh-26/"
    target: "_blank"
  - name: "RSS Feed"
    url: "/rss.xml"
    target: "_blank"

imageWorkers: 8
shouldCompressImages: true

features:
  generators:
    isSitemapEnabled: true
    isRSSEnabled: true
    isSearchEnabled: true
    isPWAEnabled: true
    graph:
      isEnabled: true
      showsTags: true
