# Blog Source Configuration
title: "Kush Blogs"
description: "Deep dives into Machine Learning, Systems Engineering, and LLMs by Kush Singh."
logo: "static/images/logo.png"
baseURL: ""  # Set to empty for root-domain relative paths
language: "en"

server:
  rootDirectory: ".."

author:
  name: "Kush Singh"
  url: "../"

# Output configuration - outputs to root (sibling to blogs-src)
outputDir: ".."
contentDir: "content"
cacheDir: ".kosh-cache"

# Theme
theme: "blog"
themeDir: "themes"

# Navigation
menu:
  - name: "Portfolio"
    url: "/"
  - name: "Blog"
    url: "/blogs/"
  - name: "Search"
    id: "search-btn"
    class: "nav-btn"
  - name: "Tags"
    url: "/tags/"
  - name: "Graph"
    url: "/graph.html"

footerMenu:
  - name: "Portfolio"
    url: "/"
  - name: "GitHub"
    url: "https://github.com/Kush-Singh-26/"
    target: "_blank"
  - name: "RSS Feed"
    url: "/rss.xml"
    target: "_blank"

# Features
features:
  useRawMarkdown: false
  generators:
    isSitemapEnabled: true
    isRSSEnabled: true
    graph:
      isEnabled: true
      showsTags: true
    isPWAEnabled: true
    isSearchEnabled: true

# Social Cards
socialCards:
  background: "#faf8f5"
  gradient:
    - "#e8e0d0"
    - "#c9b896"
    - "#b8a078"
  angle: 135
  textColor: "#1a1a1a"

# Build Settings
postsPerPage: 10
shouldCompressImages: true
imageWorkers: 8
vipsConcurrency: 4
parserWorkers: 8  
blogPrefix: "/blogs"
