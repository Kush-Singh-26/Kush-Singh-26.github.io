<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Loss Manifold — Kush Singh</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0908;
            --accent: #c9a86c;
            --accent-warm: #e4c697;
            --text-main: #e4e2dd;
            --text-dim: rgba(228, 226, 221, 0.4);
            --border: rgba(201, 168, 108, 0.15);
            --glass: rgba(18, 17, 16, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Subtle Grain & Vignette */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 10;
        }
        
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 9;
        }

        .viz-container {
            width: 95vw;
            height: 90vh;
            position: relative;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #three-container {
            width: 100%;
            flex-grow: 1;
            display: block;
            cursor: crosshair;
        }

        .header {
            position: absolute;
            top: 2.5rem;
            left: 2.5rem;
            pointer-events: none;
            z-index: 20;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.4rem;
            background: linear-gradient(to right, var(--text-main), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: lowercase;
            letter-spacing: 0.1em;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .pulse {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        .controls-overlay {
            position: absolute;
            top: 2.5rem;
            right: 2.5rem;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: flex-end;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border-radius: 4px;
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg-deep);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 168, 108, 0.3);
        }
        
        .btn.active {
            background: rgba(201, 168, 108, 0.2);
            border-color: var(--accent);
        }

        .status-ui {
            position: absolute;
            bottom: 2.5rem;
            left: 2.5rem;
            right: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 20;
        }

        .stats-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border: 1px solid var(--border);
            color: var(--accent);
            font-size: 0.6rem;
            font-family: 'JetBrains Mono';
            border-radius: 3px;
            background: rgba(201, 168, 108, 0.05);
        }

        .progress-container {
            width: 200px;
            height: 1px;
            background: rgba(201, 168, 108, 0.1);
            margin: 0.8rem 0;
            position: relative;
            overflow: hidden;
        }

        #progress-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transition: width 0.3s ease;
        }

        .back-home {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-decoration: none;
            color: var(--text-dim);
            font-family: 'JetBrains Mono';
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            transition: color 0.3s;
        }

        .back-home:hover {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.1rem; }
            .controls-overlay { top: 1.5rem; right: 1.5rem; }
            .header { top: 1.5rem; left: 1.5rem; }
            .status-ui { bottom: 1.5rem; left: 1.5rem; right: 1.5rem; flex-direction: column; align-items: flex-start; gap: 1rem; }
            .stats-group:last-child { align-items: flex-start; text-align: left; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← ESC_TO_EXIT</a>

    <div class="viz-container">
        <div class="header">
            <h1>Loss Manifold Visualizer</h1>
            <div class="mono"><span class="pulse"></span> engine_status: <span id="state">initializing</span></div>
        </div>

        <div class="controls-overlay">
            <button class="btn" id="btn-wireframe">Toggle Wireframe</button>
            <button class="btn" id="btn-mutate">Mutate Topology</button>
            <button class="btn" id="btn-reset">Reset Agent</button>
        </div>

        <div id="three-container"></div>

        <div class="status-ui">
            <div class="stats-group">
                <div class="mono">tensor.coord: [<span id="pos">0.00, 0.00</span>]</div>
                <div class="mono">loss.val: <span id="loss-value">0.0000</span></div>
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>
            
            <div class="stats-group" style="align-items: flex-end; text-align: right;">
                <div class="mono" style="margin-bottom: 0.5rem;">optimizer: adam_variant_v2</div>
                <div>
                    <span class="badge">stochastic</span>
                    <span class="badge">momentum_0.9</span>
                    <span class="badge">gpu_accelerated</span>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Configuration ---
        const GRID_SIZE = 60;
        const GRID_RES = 130;
        const NUM_FEATURES = 22;
        const AGENT_SPEED = 0.35;
        const MOMENTUM = 0.96;
        
        // --- State ---
        let state = 'EVOLVING'; 
        let timer = 0;
        let features = [];
        let agentPos = new THREE.Vector2(0, 0);
        let agentVel = new THREE.Vector2(0, 0);
        let trailPoints = [];
        const MAX_TRAIL = 100;
        let targetPos = null;
        let isWireframe = false;

        // --- Initialization ---
        const container = document.getElementById('three-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0908, 0.012);

        const camera = new THREE.PerspectiveCamera(45, container.offsetWidth / container.offsetHeight, 0.1, 1000);
        camera.position.set(50, 45, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.offsetWidth, container.offsetHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Post Processing
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.15;
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.6;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.maxDistance = 120;
        controls.minDistance = 15;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xc9a86c, 2.0);
        mainLight.position.set(30, 60, 30);
        mainLight.castShadow = true;
        scene.add(mainLight);

        const agentPointLight = new THREE.PointLight(0xc9a86c, 8, 25);
        scene.add(agentPointLight);

        // Trail
        const trailGeo = new THREE.BufferGeometry();
        const trailMat = new THREE.LineBasicMaterial({ 
            color: 0xc9a86c, 
            transparent: true, 
            opacity: 0.4,
            blending: THREE.AdditiveBlending 
        });
        const trailLine = new THREE.Line(trailGeo, trailMat);
        scene.add(trailLine);

        // Plane Geometry
        const geometry = new THREE.PlaneGeometry(GRID_SIZE, GRID_SIZE, GRID_RES, GRID_RES);
        geometry.rotateX(-Math.PI / 2);
        
        const material = new THREE.MeshStandardMaterial({
            vertexColors: true,
            roughness: 0.15,
            metalness: 0.95,
            flatShading: false,
            envMapIntensity: 1.2
        });
        const plane = new THREE.Mesh(geometry, material);
        plane.receiveShadow = true;
        scene.add(plane);

        // Agent
        const agentGroup = new THREE.Group();
        const agentCoreGeo = new THREE.SphereGeometry(0.6, 32, 32);
        const agentCoreMat = new THREE.MeshStandardMaterial({ 
            color: 0xc9a86c, 
            emissive: 0xc9a86c, 
            emissiveIntensity: 3,
            metalness: 1.0,
            roughness: 0.0
        });
        const agentCore = new THREE.Mesh(agentCoreGeo, agentCoreMat);
        agentCore.castShadow = true;
        agentGroup.add(agentCore);

        // Agent Outer Glow
        const agentGlowGeo = new THREE.SphereGeometry(1.0, 32, 32);
        const agentGlowMat = new THREE.MeshBasicMaterial({ 
            color: 0xc9a86c, 
            transparent: true, 
            opacity: 0.2 
        });
        const agentGlow = new THREE.Mesh(agentGlowGeo, agentGlowMat);
        agentGroup.add(agentGlow);
        scene.add(agentGroup);

        // Helper Grid
        const gridHelper = new THREE.GridHelper(GRID_SIZE, 30, 0xc9a86c, 0xc9a86c);
        gridHelper.position.y = -0.2;
        gridHelper.material.opacity = 0.12;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // --- Logic ---

        function initFeatures() {
            features = [];
            for (let i = 0; i < NUM_FEATURES; i++) {
                const isHill = Math.random() > 0.4;
                const targetAmp = isHill ? (6 + Math.random() * 14) : (-8 - Math.random() * 12);
                const tx = (Math.random() - 0.5) * GRID_SIZE * 0.85;
                const tz = (Math.random() - 0.5) * GRID_SIZE * 0.85;
                features.push({
                    x: tx, z: tz,
                    targetX: tx, targetZ: tz,
                    amp: 0, 
                    targetAmp: targetAmp,
                    sigma: 4 + Math.random() * 5
                });
            }
        }

        function getHeight(x, z) {
            const distSq = x * x + z * z;
            let y = 1.0 + 0.003 * distSq;
            
            const boundary = GRID_SIZE * 0.45;
            if (Math.abs(x) > boundary) y += Math.pow(Math.abs(x) - boundary, 3) * 0.8;
            if (Math.abs(z) > boundary) y += Math.pow(Math.abs(z) - boundary, 3) * 0.8;

            for (const f of features) {
                const dx = x - f.x;
                const dz = z - f.z;
                const fDistSq = dx * dx + dz * dz;
                y += f.amp * Math.exp(-fDistSq / (2 * f.sigma * f.sigma));
            }
            return Math.max(0, y);
        }

        function getGradient(x, z) {
            const h = 0.05;
            const y = getHeight(x, z);
            const dx = (getHeight(x + h, z) - y) / h;
            const dz = (getHeight(x, z + h) - y) / h;
            return new THREE.Vector2(dx, dz);
        }

        function teleportToPeak() {
            let maxH = -Infinity;
            let peakX = 0, peakZ = 0;
            for (let i = 0; i < 80; i++) {
                const tx = (Math.random() - 0.5) * GRID_SIZE * 0.8;
                const tz = (Math.random() - 0.5) * GRID_SIZE * 0.8;
                const h = getHeight(tx, tz);
                if (h > maxH) { maxH = h; peakX = tx; peakZ = tz; }
            }
            agentPos.set(peakX, peakZ);
            agentVel.set(0, 0);
            targetPos = null;
            trailPoints = [];
        }

        function mutateLandscape() {
            state = 'MUTATING';
            document.getElementById('state').innerText = 'mutating_topology';
            for (const f of features) {
                f.targetAmp = (Math.random() - 0.4) * 25; 
                f.targetX = (Math.random() - 0.5) * GRID_SIZE * 0.85;
                f.targetZ = (Math.random() - 0.5) * GRID_SIZE * 0.85;
            }
        }

        function updatePlane() {
            const positions = geometry.attributes.position.array;
            const colors = [];
            const color = new THREE.Color();
            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i];
                const z = positions[i + 2];
                const y = getHeight(x, z);
                positions[i + 1] = y;

                const h = Math.min(Math.max(y / 25, 0), 1);
                if (h < 0.4) {
                    color.setHSL(0.1, 0.45, 0.05 + h * 0.5); 
                } else {
                    color.setHSL(0.1 + (h-0.4)*0.08, 0.6, 0.25 + (h-0.4)*1.5);
                }
                colors.push(color.r, color.g, color.b);
            }
            geometry.attributes.position.needsUpdate = true;
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.computeVertexNormals();
        }

        function updateTrail(pos, height) {
            trailPoints.push(new THREE.Vector3(pos.x, height + 0.1, pos.y));
            if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
            
            trailGeo.setFromPoints(trailPoints);
        }

        // --- Event Listeners ---
        document.getElementById('btn-wireframe').addEventListener('click', (e) => {
            isWireframe = !isWireframe;
            material.wireframe = isWireframe;
            e.target.classList.toggle('active', isWireframe);
        });

        document.getElementById('btn-mutate').addEventListener('click', mutateLandscape);
        
        document.getElementById('btn-reset').addEventListener('click', () => {
            teleportToPeak();
            state = 'OPTIMIZING';
            document.getElementById('state').innerText = 'optimizing';
        });

        container.addEventListener('mousedown', (event) => {
            if (event.button !== 0) return;
            
            const rect = container.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((event.clientX - rect.left) / rect.width) * 2 - 1,
                -((event.clientY - rect.top) / rect.height) * 2 + 1
            );

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(plane);

            if (intersects.length > 0) {
                const p = intersects[0].point;
                targetPos = new THREE.Vector2(p.x, p.z);
                state = 'OPTIMIZING';
                document.getElementById('state').innerText = 'manual_override';
            }
        });

        // --- Main Loop ---
        initFeatures();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const stateEl = document.getElementById('state');
            const posEl = document.getElementById('pos');
            const lossEl = document.getElementById('loss-value');
            const progressBar = document.getElementById('progress-bar');

            let settled = true;
            
            switch (state) {
                case 'EVOLVING':
                case 'MUTATING':
                    for (const f of features) {
                        const diffA = f.targetAmp - f.amp;
                        const diffX = f.targetX - f.x;
                        const diffZ = f.targetZ - f.z;
                        if (Math.abs(diffA) > 0.02) { f.amp += diffA * 0.08; settled = false; }
                        if (Math.abs(diffX) > 0.02) { f.x += diffX * 0.08; settled = false; }
                        if (Math.abs(diffZ) > 0.02) { f.z += diffZ * 0.08; settled = false; }
                    }
                    updatePlane();
                    if (settled) {
                        state = 'OPTIMIZING';
                        stateEl.innerText = 'optimizing';
                        if (!targetPos) teleportToPeak();
                    }
                    break;
                case 'OPTIMIZING':
                    let grad;
                    if (targetPos) {
                        grad = new THREE.Vector2(agentPos.x - targetPos.x, agentPos.y - targetPos.y).multiplyScalar(0.25);
                        if (agentPos.distanceTo(targetPos) < 1.0) targetPos = null;
                    } else {
                        grad = getGradient(agentPos.x, agentPos.y);
                    }
                    
                    // Add slight stochastic noise for visibility
                    const noise = (Math.random() - 0.5) * 0.02;
                    agentVel.x = agentVel.x * MOMENTUM - (grad.x + noise) * AGENT_SPEED;
                    agentVel.y = agentVel.y * MOMENTUM - (grad.y + noise) * AGENT_SPEED;
                    agentPos.x += agentVel.x;
                    agentPos.y += agentVel.y;
                    
                    const limit = GRID_SIZE / 2 - 3;
                    if (Math.abs(agentPos.x) > limit) { agentPos.x = Math.sign(agentPos.x) * limit; agentVel.x *= -0.3; }
                    if (Math.abs(agentPos.y) > limit) { agentPos.y = Math.sign(agentPos.y) * limit; agentVel.y *= -0.3; }

                    if (!targetPos && grad.length() < 0.002 && agentVel.length() < 0.002) {
                        state = 'STABLE';
                        stateEl.innerText = 'converged';
                        timer = 0;
                    }
                    break;
                case 'STABLE':
                    timer++;
                    if (timer > 150) mutateLandscape();
                    break;
            }

            const ay = getHeight(agentPos.x, agentPos.y);
            agentGroup.position.set(agentPos.x, ay + 0.8, agentPos.y);
            agentPointLight.position.set(agentPos.x, ay + 3.5, agentPos.y);
            
            updateTrail(agentPos, ay);
            
            agentGlow.scale.setScalar(1.2 + Math.sin(Date.now() * 0.008) * 0.4);
            agentCore.rotation.y += 0.05;
            agentCore.rotation.x += 0.02;

            posEl.innerText = `${agentPos.x.toFixed(2)}, ${agentPos.y.toFixed(2)}`;
            lossEl.innerText = ay.toFixed(4);
            
            let prog = 0;
            if (state === 'OPTIMIZING') prog = 30 + (1 - Math.min(agentVel.length()*3, 1)) * 60;
            if (state === 'STABLE') prog = 100;
            if (state === 'MUTATING') prog = Math.random() * 25;
            progressBar.style.width = prog + '%';

            composer.render();
        }

        animate();

        window.addEventListener('resize', () => {
            const w = container.offsetWidth;
            const h = container.offsetHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
        });
    </script>
</body>
</html>
