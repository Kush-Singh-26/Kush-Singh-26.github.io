about:
  largeText: "I'm Kush Singh — an engineer obsessed with the machinery beneath the abstraction. I build ML pipelines, static-site engines, and distributed systems. Currently pursuing my B.Tech in Computer Science, I research LLMs, train transformers from scratch, and write about all of it."
  profileImg: "static/images/portfolio/profile-photo.webp"


projects:
  - eyebrow: "01 / NLP"
    title: "Transformer from Scratch"
    description: "Full implementation of the original Attention is All You Need architecture in PyTorch — positional encoding, multi-head attention, encoder-decoder, and custom training loop."
    tags: ["PyTorch", "NLP", "Transformers", "CUDA"]
    github: "https://github.com/Kush-Singh-26/NLP"

  - eyebrow: "02 / SSG"
    title: "Kosh — Static Site Generator"
    description: "A production-grade Go SSG with BoltDB caching, WASM-powered search, WebP conversion, LaTeX/D2 SSR, and a live-reload dev server. Powers this very site."
    tags: ["Go", "BoltDB", "WASM", "esbuild"]
    github: "https://github.com/Kush-Singh-26/kosh"

  - eyebrow: "03 / CV"
    title: "Computer Vision Experiments"
    description: "Hands-on implementations of CNNs, ResNets, and vision transformers for image classification and object detection tasks using PyTorch and CUDA."
