    github: "https://github.com/Kush-Singh-26/"

  - eyebrow: "04 / Systems"
    title: "Distributed Cache Layer"
    description: "A consistent-hashing distributed cache built in Go with LRU eviction, replication, and a gRPC control plane for node discovery."
    tags: ["Go", "gRPC", "Distributed Systems"]
