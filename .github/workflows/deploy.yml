name: Deploy Portfolio with Blog

on:
  push:
    branches: ["main"]
  repository_dispatch:
    types: [kosh-updated, theme-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Portfolio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install Kosh
        run: |
          curl -sSL https://github.com/Kush-Singh-26/kosh/releases/latest/download/kosh-linux-amd64 -o kosh
          chmod +x kosh
          sudo mv kosh /usr/local/bin/

      - name: Setup Blog Theme
        run: |
          mkdir -p blogs-src/themes
          if [ -d "blogs-src/themes/blog" ] && [ ! -d "blogs-src/themes/blog/.git" ]; then
            rm -rf blogs-src/themes/blog
          fi
          if [ -d "blogs-src/themes/blog/.git" ]; then
            cd blogs-src/themes/blog
            git fetch origin
            git reset --hard origin/main
          else
            git clone https://github.com/Kush-Singh-26/kosh-theme-blog blogs-src/themes/blog
          fi

      - name: Restore File Timestamps
        uses: chetan/git-restore-mtime-action@v2

      - name: Restore Build Cache
        uses: actions/cache@v4
        with:
          path: blogs-src/.kosh-cache
          key: kosh-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: kosh-cache-${{ runner.os }}-
      
      - name: Build Blog
        working-directory: blogs-src
        run: kosh build -baseurl https://kush-singh-26.github.io/blogs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4